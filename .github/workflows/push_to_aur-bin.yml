name: Push to AUR-BIN
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
jobs:
  push_to_aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: generate PKGBUILD and .SRCINFO
      run: |
        TAG=$(curl -s https://api.github.com/repos/Bilup/desktop/releases/latest | grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
        echo "Latest release tag: ${TAG}"
        VERSION=${TAG#v}
        cat > PKGBUILD << EOF
        # Maintainer: RyaninCn11 <me@ryanincn11.me>
        options=(!strip !debug)
        pkgname=bilup-bin
        provides=('bilup')
        conflicts=('bilup' 'bilup-git')
        pkgver=${VERSION}
        pkgrel=1
        pkgdesc='TurboWarp mod with Chinese translations and live collaboration.'
        arch=('x86_64' 'aarch64' 'armv7h')
        url='https://github.com/Bilup/'
        license=('GPL3')
        depends=('alsa-lib' 'gtk3' 'nss' 'libxss' 'xdg-utils' 'hicolor-icon-theme')
        source_x86_64=("bilup-\${pkgver}-x86_64.deb::${url}/Desktop/}releases/download/${TAG}/Bilup-linux-amd64-\${pkgver}.deb")
        source_armv7h=("bilup-\${pkgver}-armv7h.deb::${url}/Desktop/releases/download/${TAG}/Bilup-linux-armv7l-\${pkgver}.deb")
        source_aarch64=("bilup-\${pkgver}-aarch64.deb::${url}/Desktop/releases/download/${TAG}/Bilup-linux-arm64-\${pkgver}.deb")
        sha256sums_x86_64=('SKIP')
        sha256sums_armv7h=('SKIP')
        sha256sums_aarch64=('SKIP')

        build() {
            cd "\$srcdir"

            case "\$CARCH" in
                x86_64)  debfile="bilup-\${pkgver}-x86_64.deb" ;;
                aarch64) debfile="bilup-\${pkgver}-aarch64.deb" ;;
                armv7h)  debfile="bilup-\${pkgver}-armv7h.deb" ;;
            esac
            bsdtar -xf "\$debfile"
            bsdtar -xf data.tar.xz
        }

        package() {
            cp -r "\$srcdir/opt" "\$pkgdir"
            cp -r "\$srcdir/usr" "\$pkgdir"
            if [ ! -L "\$pkgdir/usr/bin/Bilup-desktop" ]; then
                install -d "\$pkgdir/usr/bin"
                ln -sf '/opt/Bilup/Bilup-desktop' "\$pkgdir/usr/bin/Bilup-desktop"
            fi
        }
        EOF

        cat > .SRCINFO << EOF
        pkgbase = bilup-bin
          pkgdesc = TurboWarp mod with Chinese translations and live collaboration.
          pkgver = ${VERSION}
          pkgrel = 1
          url = https://github.com/Bilup/
          arch = x86_64
          arch = armv7h
          arch = aarch64
          license = GPL3
          depends = alsa-lib 
          depends = gtk3
          depends = nss
          depends = libxss
          depends = xdg-utils
          depends = hicolor-icon-theme
          provides = bilup-bin
          source_x86_64=("bilup-\${pkgver}-x86_64.deb::${url}/Desktop/releases/download/${TAG}/Bilup-linux-amd64-\${pkgver}.deb")
          source_armv7h=("bilup-\${pkgver}-armv7h.deb::${url}/Desktop/releases/download/${TAG}/Bilup-linux-armv7l-\${pkgver}.deb")
          source_aarch64=("bilup-\${pkgver}-aarch64.deb::${url}/Desktop/releases/download/${TAG}/Bilup-linux-arm64-\${pkgver}.deb")
          sha256sums_x86_64=('SKIP')
          sha256sums_armv7h=('SKIP')
          sha256sums_aarch64=('SKIP')
          pkgname = bilup-bin
        EOF
    - name: Push to AUR
      uses: KSXGitHub/github-actions-deploy-aur@v4.1.3 
      with:
        pkgname: bilup-bin
        pkgbuild: ./PKGBUILD
        assets: |
          .SRCINFO
        commit_username: ${{ secrets.AUR_USERNAME }}
        commit_email: ${{ secrets.AUR_EMAIL }}
        ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        commit_message: Update AUR package
        ssh_keyscan_types: ed25519
